apiVersion: apps/v1
kind: Deployment
metadata:
  name: vetautet-app-canary
  namespace: vetautet
  labels:
    app: vetautet-app
    version: canary
spec:
  replicas: 1        # 1 canary + 2 stable = ~33% canary traffic
  selector:
    matchLabels:
      app: vetautet-app
      version: canary
  template:
    metadata:
      labels:
        app: vetautet-app   # must match Service selector to receive traffic
        version: canary
    spec:how
      containers:
        - name: vetautet-app
          image: vetautet-app:canary   # new image version to test
          imagePullPolicy: Never
          ports:
            - containerPort: 1122
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-service:3306/vetautet"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: SPRING_DATA_REDIS_HOST
              value: "redis-service"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: LOGSTASH_HOST
              value: "logstash:5044"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 1122
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 1122
            initialDelaySeconds: 60
            periodSeconds: 15