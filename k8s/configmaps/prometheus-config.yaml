apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: vetautet
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "banvetau-springboot"
        scrape_interval: 5s
        static_configs:
          - targets: ["app-service:1122"]
        metrics_path: "/actuator/prometheus"

      - job_name: "banvetau-mysql-exporter"
        scrape_interval: 5s
        static_configs:
          - targets: ["mysqld-exporter-service:9104"]

      - job_name: "banvetau-redis-exporter"
        scrape_interval: 5s
        static_configs:
          - targets: ["redis-exporter-service:9121"]

      - job_name: "banvetau-kafka-exporter"
        scrape_interval: 5s
        static_configs:
          - targets: ["kafka-exporter-service:9308"]

      - job_name: "banvetau-node-exporter"
        scrape_interval: 5s
        static_configs:
          - targets: ["node-exporter-service:9100"]
